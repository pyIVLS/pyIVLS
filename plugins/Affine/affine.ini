[plugin]
name = Affine
type = script
function = positioning
dependencies = camera
version = 2.1.0

[Affine_settings]
pointcount = 2
camera = DummyCamera
addpointscheck = True
centerclicks = True
blurmask = False
invertmask = False
equalizemask = False
cannymask = True
otsumask = False
manualthresholdmask = False
thresholdmask = 128
morphologymask = False
morphologytypemask = erosion
morphologystrengthmask = 3
blurimage = False
invertimage = False
equalizeimage = False
cannyimage = True
otsuimage = False
manualthresholdimage = False
thresholdimage = 128
morphologyimage = False
morphologytypeimage = erosion
morphologystrengthimage = 3
sigmaimage = 2.0
sigmamask = 2.0
ratiotest = 0.75
residualthreshold = 10
crosscheck = False
backend = SIFT
scalingfactor = 0.5



